{% extends "base.html" %}
{% block title %}Nueva Cita · VetCitas{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow border-0">
      <div class="card-header bg-success text-white fs-5 fw-bold">
        <i class="bi bi-calendar-plus me-2"></i>Agendar Nueva Cita
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('agendar') }}">

          <div class="mb-3">
            <label class="form-label fw-bold">Nombre de la Mascota</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-heart-fill"></i></span>
              <input type="text" name="mascota" class="form-control" placeholder="ej. Firulais" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Propietario</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-person-fill"></i></span>
              <input type="text" name="propietario" class="form-control" placeholder="Nombre del dueño" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Especie</label>
            <select name="especie" class="form-select">
              <option value="Perro">🐶 Perro</option>
              <option value="Gato">🐱 Gato</option>
              <option value="Ave">🐦 Ave</option>
              <option value="Conejo">🐰 Conejo</option>
              <option value="Otro">🐾 Otro</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Fecha de la Cita</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-calendar-event"></i></span>
              <input type="date" name="fecha" class="form-control" required>
            </div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-success fw-bold flex-fill">
              <i class="bi bi-check-circle me-1"></i>Guardar Cita
            </button>
            <a href="{{ url_for('agenda') }}" class="btn btn-outline-success fw-bold flex-fill text-center">
              <i class="bi bi-arrow-left me-1"></i>Volver
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
