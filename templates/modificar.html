{% extends "base.html" %}
{% block title %}Editar Cita · VetCitas{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow border-0">
      <div class="card-header bg-warning text-dark fs-5 fw-bold">
        <i class="bi bi-pencil-square me-2"></i>Editar Cita — {{ cita.mascota }}
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('modificar', id=cita.id) }}">

          <div class="mb-3">
            <label class="form-label fw-bold">Nombre de la Mascota</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-heart-fill"></i></span>
              <input type="text" name="mascota" class="form-control" value="{{ cita.mascota }}" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Propietario</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-person-fill"></i></span>
              <input type="text" name="propietario" class="form-control" value="{{ cita.propietario }}" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Especie</label>
            <select name="especie" class="form-select">
              {% for esp in ['Perro','Gato','Ave','Conejo','Otro'] %}
              <option value="{{ esp }}" {% if cita.especie == esp %}selected{% endif %}>{{ esp }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Fecha de la Cita</label>
            <div class="input-group">
              <span class="input-group-text bg-success text-white"><i class="bi bi-calendar-event"></i></span>
              <input type="date" name="fecha" class="form-control" value="{{ cita.fecha }}" required>
            </div>
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-warning fw-bold flex-fill text-dark">
              <i class="bi bi-check-circle me-1"></i>Guardar Cambios
            </button>
            <a href="{{ url_for('agenda') }}" class="btn btn-outline-secondary fw-bold flex-fill text-center">
              <i class="bi bi-arrow-left me-1"></i>Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
